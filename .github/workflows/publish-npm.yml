name: Publish to NPM
on:
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.SDK_GENERATION_APP_ID }}
          private-key: ${{ secrets.SDK_GENERATION_APP_PRIVATE_KEY }}

      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          npm i -g auto-changelog

  publish:
    needs: bump-version
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC/Trusted Publishing
      contents: read
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm 11.5.1+
        run: npm install -g npm@^11

      - name: Install dependencies
        run: npm install

  publish-to-private-registry:
    needs: publish
    runs-on: [self-hosted, dx]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Node for private registry publishing
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: ${{ secrets.PRIVATE_NPM_REGISTRY_URL }}

      - name: Publish package to private registry
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PRIVATE_NPM_REGISTRY_TOKEN }}
          SKIP_POSTVERSION: true
